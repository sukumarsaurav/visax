name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint • Test • Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Surface ESLint errors but don't fail the build on warnings.
        run: npm run lint -- --max-warnings 9999

      - name: Run tests
        run: npm test

      - name: Production build
        # Build needs Supabase env vars even for non-runtime use (import.meta.env
        # lookups happen at module evaluation). Stub them out for CI.
        env:
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key
        run: npm run build
