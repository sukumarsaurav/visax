<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FTUE: Personalized Welcome</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden h-screen w-full relative">
<!-- Background Dashboard Simulation (blurred/dimmed) -->
<div aria-hidden="true" class="absolute inset-0 z-0 flex flex-col opacity-30 blur-[2px] pointer-events-none select-none">
<!-- Header -->
<header class="flex h-16 items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6">
<div class="flex items-center gap-4">
<div class="h-8 w-8 rounded bg-primary/20"></div>
<div class="h-4 w-32 rounded bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="flex items-center gap-4">
<div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
</header>
<!-- Main Layout -->
<div class="flex flex-1 overflow-hidden">
<!-- Sidebar -->
<aside class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 hidden md:flex flex-col gap-4">
<div class="h-10 w-full rounded bg-primary/10"></div>
<div class="h-10 w-full rounded bg-transparent"></div>
<div class="h-10 w-full rounded bg-transparent"></div>
<div class="h-10 w-full rounded bg-transparent"></div>
</aside>
<!-- Content -->
<main class="flex-1 p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="col-span-2 h-48 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
<div class="h-48 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
<div class="h-64 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
<div class="col-span-2 h-64 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
</main>
</div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 z-50 flex items-center justify-center bg-[#101822]/60 backdrop-blur-sm p-4 animate-in fade-in duration-300">
<!-- Modal Card -->
<div class="w-full max-w-[800px] overflow-hidden rounded-xl bg-white dark:bg-[#1A2633] shadow-2xl ring-1 ring-slate-900/5 dark:ring-white/10 zoom-in-95 duration-300 animate-in slide-in-from-bottom-4">
<div class="flex flex-col md:flex-row">
<!-- Hero Image Side -->
<div class="relative w-full md:w-5/12 h-48 md:h-auto bg-slate-100 dark:bg-slate-800">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Group of diverse people working together around a table representing community support" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAjq7nMaCglhJO-7M0NzhTGDx96eMwHgZYBQnvkpy2-ZbHsiGF8cNQonbx3ebfzdlKX4p1NIbNQZ35D8w6sTa7sms107qqN8_HJo9vOukZLQ-V25UvyCsX6IK5y1amR9xxNx_4hQ_qS5NHyaEXm7rjkTUGL4AmBMn6RAtRDsmh9f-3ZTXYDYw4l7vMtI818HXAX2jNvQuqAKSIgzFvAVHrHFT3_nhcoRSB6wuf9oCil4P6C54PnhBQyaV6mpJRN8XOKT4CvnGVVoQE');">
</div>
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
<!-- Decorative Icon Overlay -->
<div class="absolute top-4 left-4 h-10 w-10 flex items-center justify-center rounded-full bg-white/90 dark:bg-slate-900/90 shadow-sm backdrop-blur-md">
<span class="material-symbols-outlined text-primary text-xl">handshake</span>
</div>
</div>
<!-- Content Side -->
<div class="flex flex-1 flex-col justify-center p-6 md:p-10">
<div class="mb-2 flex items-center gap-2">
<span class="inline-flex items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30 px-2.5 py-0.5 text-xs font-medium text-green-700 dark:text-green-400">
                            Verified Account
                        </span>
</div>
<h1 class="mb-3 text-2xl md:text-3xl font-bold leading-tight tracking-tight text-slate-900 dark:text-white">
                        Welcome, Alejandro!
                    </h1>
<p class="mb-8 text-base leading-relaxed text-slate-600 dark:text-slate-300">
                        We're glad you're here. Our marketplace connects you with verified legal, housing, and career experts to help you settle in faster. Let's take a quick look around your new dashboard.
                    </p>
<div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
<!-- Primary Action: Start Tour -->
<button class="group relative flex items-center justify-center gap-2 overflow-hidden rounded-lg bg-primary px-6 py-3 text-sm font-bold text-white shadow-md shadow-primary/20 transition-all hover:bg-primary/90 hover:shadow-lg hover:shadow-primary/30 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-[#1A2633]">
<span class="material-symbols-outlined text-[20px]">play_circle</span>
<span>Start 2-Minute Tour</span>
</button>
<!-- Secondary Action: Skip -->
<button class="flex items-center justify-center gap-2 rounded-lg bg-transparent px-6 py-3 text-sm font-bold text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700/50 dark:hover:text-white">
<span>Explore on my own</span>
</button>
</div>
<!-- Footer Note -->
<div class="mt-8 flex items-center gap-2 text-xs text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-[16px]">info</span>
<p>You can always restart the tour from your profile settings.</p>
</div>
</div>
</div>
</div>
</div>
</body></html>
