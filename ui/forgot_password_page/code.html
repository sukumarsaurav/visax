<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Immigrant Marketplace</title>
<!-- Tailwind CSS with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#136dec",
                    "background-light": "#f6f7f8",
                    "background-dark": "#101822",
                    "card-light": "#ffffff",
                    "card-dark": "#1a2430",
                    "text-main": "#0d131b",
                    "text-secondary": "#4c6c9a",
                    "border-light": "#e7ecf3",
                    "border-dark": "#2d3b4e"
                },
                fontFamily: {
                    "display": ["Manrope", "Noto Sans", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                boxShadow: {
                    'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    'input-focus': '0 0 0 2px rgba(19, 109, 236, 0.2)'
                }
            },
        },
    }
    </script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Noto+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
</head>
<body class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark font-display text-text-main dark:text-white transition-colors duration-200">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-light dark:border-border-dark px-10 py-4 bg-card-light dark:bg-card-dark">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<!-- Logo SVG -->
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-text-main dark:text-white text-xl font-bold leading-tight tracking-tight">Immigrant Marketplace</h2>
</div>
<div class="hidden sm:block">
<a class="text-sm font-medium text-text-secondary dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">Need help?</a>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-4 sm:p-6">
<div class="layout-content-container flex flex-col max-w-md w-full flex-1">
<!-- Card Container -->
<div class="bg-card-light dark:bg-card-dark rounded-xl shadow-card border border-border-light dark:border-border-dark overflow-hidden p-8 sm:p-10 transition-colors duration-200">
<!-- Icon Header -->
<div class="flex justify-center mb-6">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined !text-[32px]">lock_reset</span>
</div>
</div>
<!-- Headline -->
<h1 class="text-text-main dark:text-white tracking-tight text-[28px] font-bold leading-tight text-center mb-3">
                    Forgot Password?
                </h1>
<!-- Body Text -->
<p class="text-text-secondary dark:text-slate-400 text-base font-normal leading-relaxed text-center mb-8 px-2">
                    Enter the email associated with your account and we’ll send you a link to reset your password.
                </p>
<!-- Form -->
<form class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-white text-sm font-semibold leading-normal" for="email">Email address</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-text-main dark:text-white bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-text-secondary dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal transition-all" id="email" name="email" placeholder="name@example.com" required="" type="email" value=""/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-text-secondary dark:text-slate-500">
<span class="material-symbols-outlined !text-xl">mail</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="flex w-full items-center justify-center rounded-lg bg-primary hover:bg-[#1160d1] text-white font-bold h-14 transition-colors duration-200 shadow-sm mt-2">
<span class="text-base tracking-wide">Send Reset Link</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-border-light dark:border-border-dark flex justify-center">
<a class="group flex items-center gap-2 text-text-secondary dark:text-slate-400 hover:text-text-main dark:hover:text-white font-medium transition-colors text-sm" href="#">
<span class="material-symbols-outlined !text-base transition-transform group-hover:-translate-x-1">arrow_back</span>
                        Back to log in
                    </a>
</div>
</div>
<!-- Bottom Security Note -->
<div class="mt-6 text-center">
<p class="text-xs text-text-secondary dark:text-slate-500 flex items-center justify-center gap-1">
<span class="material-symbols-outlined !text-sm">lock</span>
                    Secure Encrypted Connection
                </p>
</div>
</div>
</main>
</body></html>
